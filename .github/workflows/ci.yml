name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: gzmo-daemon
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: gzmo-daemon
        run: bun run typecheck
